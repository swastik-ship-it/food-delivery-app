<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodieExpress</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <h1>🍔 FoodieExpress</h1>
    <a href="cart.html">🛒 Cart</a>
  </nav>
  <div class="hero">
    <h2>Order Food You Love!</h2>
    <input type="text" placeholder="🔍 Search restaurants..."/>
  </div>
  <div class="section">
    <h3>Nearby Restaurants</h3>
    <div class="grid">
      <div class="card" onclick="location.href='restaurant.html'">
        <img src="https://source.unsplash.com/300x200/?pizza"/>
        <h4>Pizza Palace</h4>
        <p>⭐ 4.5 • 20-30 min</p>
      </div>
      <div class="card" onclick="location.href='restaurant.html'">
        <img src="https://source.unsplash.com/300x200/?burger"/>
        <h4>Burger Spot</h4>
        <p>⭐ 4.2 • 15-25 min</p>
      </div>
      <div class="card" onclick="location.href='restaurant.html'">
        <img src="https://source.unsplash.com/300x200/?sushi"/>
        <h4>Sushi World</h4>
        <p>⭐ 4.8 • 30-40 min</p>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
